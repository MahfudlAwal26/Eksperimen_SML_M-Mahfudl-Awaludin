name: Auto Preprocessing Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write   

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install -r preprocessing/requirements.txt

    - name: Run Preprocessing Script
      run: |
        python preprocessing/automate_M_Mahfudl_Awaludin.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: preprocessed-data
        path: preprocessing/preprocessed_data.csv

    - name: Commit & Push Preprocessed Data
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"

        git add preprocessing/preprocessed_data.csv
        git commit -m "Update preprocessed dataset [auto]" || echo "No changes"
        git push
